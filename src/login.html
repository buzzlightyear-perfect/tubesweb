<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./output.css" rel="stylesheet">
    <title>login</title>
</head>
<body class="flex flex-col min-h-screen">
    <header>
        <div class="flex justify-between bg-[#1B3A2D] py-7 px-5 shadow-xl/30">
            <h2 class="text-white font-bold">2 GOOD COURSE</h2>
        </div>
    </header>

    <br></br>
    <br></br>

    <div class="flex flex-grow items-center justify-center bg-gray-100">
  <div class="w-full max-w-sm bg-white rounded-lg shadow-lg p-6">
    <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">Login</h2>
    
    <form class="space-y-4">
      <!-- Email -->
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
        <input
          type="email"
          id="email"
          placeholder="Masukkan email"
          class="mt-1 w-full rounded-md border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
          required
        />
      </div>

      <!-- Password -->
      <div>
        <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
        <input
          type="password"
          id="password"
          placeholder="Masukkan password"
          class="mt-1 w-full rounded-md border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
          required
        />
      </div>

      <!-- Tombol Login -->
      <button
        type="submit"
        class="w-full rounded-md bg-[#1B3A2D] text-white py-2 font-semibold hover:bg-[#52B788] transition">
        Login
      </button>
    </form>

    <!-- Link tambahan -->
    <p class="mt-4 text-center text-sm text-gray-600">
      Belum punya akun? 
      <a href="daftar.html" class="text-blue-600 hover:underline">Daftar</a>
    </p>
  </div>
</div>

  <br></br>

    <footer class="bg-[#1B3A2D] py-15">
        <h1 class="font-Poppins text-white text-center font-bold text-5xl">INI FOOTER</h1>
    </footer>

</body>
</html>
